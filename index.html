<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNVT Dealflow Atelier</title>
    <!-- Load React and ReactDOM UMD builds -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Load Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <!-- Load PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Load PptxGenJS for PPTX generation -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- Load jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F4F4F0; /* PAPER */
        }
        /* Global table cell wrapping & word break rule to prevent overflow */
        table {
            table-layout: auto;
            width: 100%;
        }
        th, td {
            word-break: break-word !important;
            overflow-wrap: anywhere !important;
            white-space: normal !important;
        }
        p, li, span, div, h1, h2, h3, h4, h5, h6 {
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        /* Mobile Responsive Overrides (iPhone 15 Pro, max-width: 768px) */
        @media (max-width: 768px) {
            /* 1. Reset padding and container widths */
            .app-container {
                width: 100% !important;
                max-width: 100% !important;
                overflow-x: hidden !important;
            }
            .app-body {
                padding: 12px 10px !important;
            }
            .app-header {
                padding: 12px 12px 0 12px !important;
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 8px !important;
            }
            .app-title {
                font-size: 20px !important;
                margin-bottom: 8px !important;
            }

            /* 2. Top-level swipeable, clean horizontal scrolling navigation tab bar */
            .tab-bar-container {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch;
                gap: 0 !important;
                width: 100% !important;
                border-bottom: 1.5px solid #000 !important;
                padding-bottom: 0 !important;
            }
            .tab-bar-container::-webkit-scrollbar {
                display: none !important;
            }
            .tab-button {
                flex: 0 0 auto !important;
                width: auto !important;
                font-size: 11.5px !important;
                padding: 8px 12px !important;
                white-space: nowrap !important;
                border-bottom-width: 2px !important;
            }

            /* 3. Grid layouts stack into clean single columns */
            .cards-grid,
            div[style*="display: grid"],
            div[style*="display:grid"] {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }

            /* 4. Table Containers: Swipe horizontally, auto wrap cell containers, keep headings well aligned */
            div:has(> table), 
            div[style*="overflow-x: auto"] {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch;
                max-width: 100% !important;
                border: 1px solid #E5E5E0 !important;
                margin-bottom: 14px !important;
                background: #fff !important;
            }
            table {
                width: 100% !important;
                table-layout: auto !important;
                border-collapse: collapse !important;
            }
            th, td {
                font-size: 11px !important;
                line-height: 1.35 !important;
                padding: 6px 8px !important;
                white-space: nowrap !important; /* Prevents words getting chopped awkwardly */
                word-break: keep-all !important;
                overflow-wrap: normal !important;
                text-align: left !important;
            }
            th {
                font-weight: 600 !important;
                background-color: #F4F4F0 !important;
                border-bottom: 1.5px solid #000 !important;
            }

            /* 5. Buttons: clean sizes, never cut words, make them small and perfectly fitted */
            button, 
            .bnvt-btn,
            div[style*="display: flex"] > button {
                font-size: 11px !important;
                padding: 6px 10px !important;
                white-space: nowrap !important;
                text-overflow: ellipsis !important;
                overflow: hidden !important;
                display: inline-flex !important;
                align-items: center !important;
                justify-content: center !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
                height: auto !important;
                line-height: 1 !important;
            }

            /* 6. Form inputs and select controls styling */
            input, select, textarea, .bnvt-input, .bnvt-textarea {
                max-width: 100% !important;
                font-size: 14px !important;
                padding: 6px 8px !important;
                box-sizing: border-box !important;
            }

            /* 7. Side Drawer & Modals become mobile bottom sheets */
            div[style*="width: 320px"], 
            div[style*="width: 350px"], 
            div[style*="width: 400px"], 
            div[style*="width: 30%"], 
            div[style*="width: 40%"] {
                width: 100% !important;
                max-width: 100% !important;
                position: fixed !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                top: auto !important;
                height: 85% !important;
                border-radius: 16px 16px 0 0 !important;
                border-left: none !important;
                border-top: 2px solid #000 !important;
                z-index: 1000 !important;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15) !important;
                overflow-y: auto !important;
            }

            /* 8. Spacers and wrappers adjustments */
            div[style*="gap: 24px"], div[style*="gap: 20px"] {
                gap: 12px !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Set up PDF.js worker
        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        }

        // Polyfill window.storage using localStorage since it's used in the app for persistence
        // We override this to sync storage to/from the server, enabling WhatsApp webhook to write directly to the db.
        const originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
            originalSetItem.call(localStorage, key, value);
            fetch('/api/storage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, value })
            })
            .then(res => {
                if (res.ok) return res.json();
            })
            .then(data => {
                if (data && data.merged_value) {
                    originalSetItem.call(localStorage, key, data.merged_value);
                }
            })
            .catch(err => console.warn("Failed to sync localStorage item to server:", err));
        };

        if (!window.storage) {
            window.storage = {
                get: async (key) => {
                    try {
                        const res = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
                        if (res.ok) {
                            const data = await res.json();
                            if (data.value !== undefined && data.value !== null) {
                                return { value: data.value };
                            }
                        }
                    } catch (e) {
                        console.warn("Server storage get failed, falling back to localStorage", e);
                    }
                    try {
                        const val = localStorage.getItem(key);
                        return val ? { value: val } : null;
                    } catch (e) {
                        console.error("Storage get error", e);
                        return null;
                    }
                },
                set: async (key, value) => {
                    try {
                        localStorage.setItem(key, value);
                    } catch (e) {
                        console.error("Storage set error", e);
                    }
                }
            };
        }
    </script>
    <!-- Load our App component from bnvt-dealflow.jsx -->
    <script type="text/babel" src="bnvt-dealflow.jsx?v=49.0"></script>
    <!-- Render the App once it's loaded and defined on window -->
    <script type="text/babel">
        function mergeLists(clientList, serverList, keyAttr = "id") {
            const clientArr = Array.isArray(clientList) ? clientList : [];
            const serverArr = Array.isArray(serverList) ? serverList : [];
            const map = new Map();
            for (const item of clientArr) {
                if (item && item[keyAttr]) map.set(String(item[keyAttr]), item);
            }
            for (const item of serverArr) {
                if (item && item[keyAttr]) {
                    const idStr = String(item[keyAttr]);
                    if (map.has(idStr)) {
                        const clientItem = map.get(idStr);
                        const mergedNotes = [...(clientItem.notes || [])];
                        const existingNotesIds = new Set(mergedNotes.map(n => n.id || n.text));
                        for (const n of (item.notes || [])) {
                            if (!existingNotesIds.has(n.id || n.text)) {
                                mergedNotes.push(n);
                            }
                        }
                        map.set(idStr, { ...clientItem, ...item, notes: mergedNotes });
                    } else {
                        map.set(idStr, item);
                    }
                }
            }
            return Array.from(map.values());
        }

        const preSyncAndRender = async () => {
            try {
                const keys = [
                    "anthropic_api_key", "granola_api_key", "bnvt-dealflow-v1",
                    "llm_config", "groq_api_key", "openrouter_api_key", "deepseek_api_key", "openai_api_key"
                ];
                for (const key of keys) {
                    const res = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.value !== undefined && data.value !== null) {
                            if (key === "bnvt-dealflow-v1") {
                                const serverDb = JSON.parse(data.value);
                                const clientDbStr = localStorage.getItem("bnvt-dealflow-v1");
                                if (clientDbStr) {
                                    const clientDb = JSON.parse(clientDbStr);
                                    const mergedDb = {
                                        companies: mergeLists(clientDb.companies, serverDb.companies, "id"),
                                        investors: mergeLists(clientDb.investors, serverDb.investors, "id"),
                                        deepDives: mergeLists(clientDb.deepDives, serverDb.deepDives, "id"),
                                        founderProfiles: mergeLists(clientDb.founderProfiles, serverDb.founderProfiles, "id")
                                    };
                                    const mergedStr = JSON.stringify(mergedDb);
                                    originalSetItem.call(localStorage, key, mergedStr);
                                    // Send merged database back to server
                                    await fetch('/api/storage', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ key, value: mergedStr })
                                    }).catch(() => {});
                                } else {
                                    originalSetItem.call(localStorage, key, data.value);
                                }
                            } else {
                                originalSetItem.call(localStorage, key, data.value);
                            }
                        }
                    }
                }
            } catch (e) {
                console.warn("Failed to pre-sync storage from server:", e);
            }
            
            const checkAndRender = () => {
                if (window.App) {
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(
                        <React.StrictMode>
                            <window.App />
                        </React.StrictMode>
                    );
                } else {
                    setTimeout(checkAndRender, 50);
                }
            };
            checkAndRender();
        };
        preSyncAndRender();
    </script>
</body>
</html>
